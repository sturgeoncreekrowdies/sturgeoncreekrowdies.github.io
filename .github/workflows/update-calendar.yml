name: Update Calendar Events

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch-calendar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Fetch and parse Google Calendar
        run: |
          # Google Calendar URL
          CALENDAR_URL="https://calendar.google.com/calendar/ical/408c54c5483208e82d01dec30a088ede7c00ab95f7ec06abfa371b95cc051b0d%40group.calendar.google.com/public/basic.ics"
          
          echo "=== Downloading calendar ==="
          curl -L "$CALENDAR_URL" -o calendar.ics
          
          echo "=== Calendar download complete ==="
          echo "File size:"
          ls -lh calendar.ics
          echo "First 10 lines:"
          head -10 calendar.ics
          
          echo "=== Creating parsing script ==="
          cat > parse_calendar.sh << 'SCRIPT'
          #!/bin/bash
          
          echo "Starting calendar parsing..."
          
          today=$(date +%Y%m%d)
          echo "Today's date (YYYYMMDD): $today"
          
          # Create _data directory
          mkdir -p _data
          
          # Initialize JSON
          echo "[" > _data/calendar.json
          
          # Initialize variables
          current_title=""
          current_date=""
          current_date_raw=""
          first_event=true
          event_count=0
          future_event_count=0
          
          echo "=== Processing calendar entries ==="
          
          while IFS= read -r line; do
            # Check for SUMMARY
            if [[ $line == SUMMARY:* ]]; then
              current_title="${line#SUMMARY:}"
              # Trim whitespace
              current_title="${current_title#"${current_title%%[![:space:]]*}"}"
              current_title="${current_title%"${current_title##*[![:space:]]}"}"
              echo "Found event: $current_title"
            fi
            
            # Check for DTSTART (handles both formats)
            if [[ $line =~ DTSTART(:|;VALUE=DATE:)([0-9]{4})([0-9]{2})([0-9]{2}) ]]; then
              year="${BASH_REMATCH[2]}"
              month="${BASH_REMATCH[3]}"
              day="${BASH_REMATCH[4]}"
              current_date="$month/$day/$year"
              current_date_raw="${year}${month}${day}"
              echo "  Date: $current_date (raw: $current_date_raw)"
            fi
            
            # If we have all the event data
            if [[ -n "$current_title" && -n "$current_date" && -n "$current_date_raw" ]]; then
              ((event_count++))
              echo "  Processing event #$event_count: $current_title"
              echo "  Comparing $current_date_raw >= $today"
              
              if [[ $current_date_raw -ge $today ]]; then
                echo "  ✓ INCLUDING (future or today)"
                ((future_event_count++))
                
                if [ "$first_event" = true ]; then
                  first_event=false
                else
                  echo "," >> _data/calendar.json
                fi
                
                # Escape quotes and backslashes for JSON
                escaped_title=$(echo "$current_title" | sed 's/\\/\\\\/g' | sed 's/"/\\"/g')
                
                echo "  {" >> _data/calendar.json
                echo "    \"title\": \"$escaped_title\"," >> _data/calendar.json
                echo "    \"date\": \"$current_date\"" >> _data/calendar.json
                echo -n "  }" >> _data/calendar.json
              else
                echo "  ✗ SKIPPING (past event)"
              fi
              
              # Reset for next event
              current_title=""
              current_date=""
              current_date_raw=""
            fi
          done < calendar.ics
          
          # Close the JSON array
          echo "" >> _data/calendar.json
          echo "]" >> _data/calendar.json
          
          echo "=== Parsing complete ==="
          echo "Total events found: $event_count"
          echo "Future events included: $future_event_count"
          
          echo "=== Generated JSON output ==="
          cat _data/calendar.json
          SCRIPT
          
          chmod +x parse_calendar.sh
          ./parse_calendar.sh
      
      - name: Debug before commit
        run: |
          echo "=== Current directory contents ==="
          ls -la
          
          echo "=== _data directory contents ==="
          ls -la _data/ 2>/dev/null || echo "_data directory does not exist"
          
          echo "=== calendar.json content ==="
          cat _data/calendar.json 2>/dev/null || echo "calendar.json does not exist"
          
          echo "=== Git status before commit ==="
          git status
          
          echo "=== Current branch ==="
          git branch
          
          echo "=== Remote URLs ==="
          git remote -v
      
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if calendar.json exists and has content
          if [ -f _data/calendar.json ] && [ -s _data/calendar.json ]; then
            echo "✓ calendar.json exists and is not empty"
            
            # Check if it has any events (contains "title")
            if grep -q "title" _data/calendar.json; then
              echo "✓ calendar.json contains events"
              
              # Add the file
              git add _data/calendar.json
              
              # Check if there are changes to commit
              if git diff --cached --quiet; then
                echo "No changes to commit"
              else
                echo "Changes detected, committing..."
                git commit -m "Update calendar events [skip ci]"
                echo "Pushing to remote..."
                git push
                echo "✓ Successfully pushed updates"
              fi
            else
              echo "✗ calendar.json exists but contains no events (no 'title' field)"
              echo "Content:"
              cat _data/calendar.json
            fi
          else
            echo "✗ calendar.json does not exist or is empty"
            # Create a placeholder to avoid errors
            mkdir -p _data
            echo '[]' > _data/calendar.json
            git add _data/calendar.json
            git commit -m "Initialize calendar.json [skip ci]" || true
            git push || true
          fi
      
      - name: Final debug
        if: always()
        run: |
          echo "=== Final git status ==="
          git status
          echo "=== Last commit ==="
          git log -1 --oneline
