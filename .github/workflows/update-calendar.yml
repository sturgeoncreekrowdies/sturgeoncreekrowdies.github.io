name: Update Calendar Events

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch-calendar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Fetch and parse Google Calendar
        run: |
          # Your Google Calendar public iCal URL
          CALENDAR_URL="https://calendar.google.com/calendar/ical/408c54c5483208e82d01dec30a088ede7c00ab95f7ec06abfa371b95cc051b0d%40group.calendar.google.com/public/basic.ics"          
          # Download the calendar
          curl -L "$CALENDAR_URL" -o calendar.ics
          echo "Downloaded calendar.ics"
          
          # Parse using bash/awk instead of Python (no dependencies needed)
          cat > parse_calendar.sh << 'SCRIPT'
          #!/bin/bash
          
          mkdir -p _data
          
          echo "[" > _data/calendar.json
          
          # Parse the ICS file
          current_title=""
          current_date=""
          first_event=true
          
          while IFS= read -r line; do
            if [[ $line == SUMMARY:* ]]; then
              current_title="${line#SUMMARY:}"
              current_title="${current_title#"${current_title%%[![:space:]]*}"}"  # Trim leading spaces
              current_title="${current_title%"${current_title##*[![:space:]]}"}"  # Trim trailing spaces
            fi
            
            if [[ $line == DTSTART\;VALUE=DATE:* ]]; then
              current_date="${line#DTSTART;VALUE=DATE:}"
              # Format as MM/DD/YYYY
              year="${current_date:0:4}"
              month="${current_date:4:2}"
              day="${current_date:6:2}"
              current_date="$month/$day/$year"
            fi
            
            # When we have both title and date, save the event
            if [[ -n "$current_title" && -n "$current_date" ]]; then
              if [ "$first_event" = true ]; then
                first_event=false
              else
                echo "," >> _data/calendar.json
              fi
              
              # Escape double quotes and backslashes in title
              escaped_title=$(echo "$current_title" | sed 's/\\/\\\\/g' | sed 's/"/\\"/g')
              
              echo "  {" >> _data/calendar.json
              echo "    \"title\": \"$escaped_title\"," >> _data/calendar.json
              echo "    \"date\": \"$current_date\"" >> _data/calendar.json
              echo -n "  }" >> _data/calendar.json
              
              # Reset for next event
              current_title=""
              current_date=""
            fi
          done < calendar.ics
          
          echo "" >> _data/calendar.json
          echo "]" >> _data/calendar.json
          
          # Keep only first 10 events (or however many we have)
          if [ -f _data/calendar.json ]; then
            echo "Created _data/calendar.json"
            wc -l _data/calendar.json
          fi
          SCRIPT
          
          chmod +x parse_calendar.sh
          ./parse_calendar.sh
      
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if _data/calendar.json exists and has content
          if [ -s _data/calendar.json ]; then
            # Verify it's valid JSON (at least has opening bracket)
            if grep -q "\[" _data/calendar.json; then
              git add _data/calendar.json
              git diff --quiet && git diff --staged --quiet || (git commit -m "Update calendar events [skip ci]" && git push)
              echo "Calendar data updated and pushed"
            else
              echo "Generated JSON is invalid"
              cat _data/calendar.json
              exit 1
            fi
          else
            echo "No calendar data generated"
            exit 1
          fi
