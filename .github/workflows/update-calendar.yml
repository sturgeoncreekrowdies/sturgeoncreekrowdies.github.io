name: Update Calendar Events

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch-calendar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Fetch and parse Google Calendar
        run: |
          CALENDAR_URL="https://calendar.google.com/calendar/ical/408c54c5483208e82d01dec30a088ede7c00ab95f7ec06abfa371b95cc051b0d%40group.calendar.google.com/public/basic.ics?singleevents=true"
          
          curl -L "$CALENDAR_URL" -o calendar.ics
          
          cat > parse_calendar.sh << 'SCRIPT'
          
          #!/bin/bash

          today=$(date +%Y%m%d)
          mkdir -p _data
          > _data/calendar.json
          temp_events=$(mktemp)
          
          current_title=""
          current_date=""
          in_event=0

          while IFS= read -r line; do
            line=$(echo "$line" | tr -d '\r')
            if [[ "$line" == "BEGIN:VEVENT" ]]; then
              in_event=1
              current_title=""
              current_date=""
              continue
            fi
            
            if [[ "$line" == "END:VEVENT" ]]; then
              if [[ -n "$current_title" && -n "$current_date" ]]; then
                if [[ "$current_date" -ge "$today" ]]; then
                  echo "${current_date}|${current_title}|${current_date}" >> "$temp_events"
                fi
              fi
              in_event=0
              continue
            fi
            
            if [[ $in_event -eq 1 ]]; then
              if [[ "$line" == SUMMARY:* ]]; then
                current_title="${line#SUMMARY:}"
                current_title=$(echo "$current_title" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
              fi
    
              if [[ "$line" =~ DTSTART[:=] ]]; then
                if [[ "$line" =~ ([0-9]{4})([0-9]{2})([0-9]{2}) ]]; then
                  year="${BASH_REMATCH[1]}"
                  month="${BASH_REMATCH[2]}"
                  day="${BASH_REMATCH[3]}"
                  current_date="${year}${month}${day}"
                fi
              fi
            fi
          done < calendar.ics

          if [ -s "$temp_events" ]; then
            sort -t'|' -k1,1n "$temp_events" > "${temp_events}.sorted"
            
            echo "[" > _data/calendar.json
            first=1
  
            while IFS='|' read -r raw_date title display_date; do
              year="${raw_date:0:4}"
              month="${raw_date:4:2}"
              day="${raw_date:6:2}"
              formatted_date="$month/$day/$year"
    
              escaped_title=$(printf "%s" "$title" | sed 's/\\/\\\\/g' | sed 's/"/\\"/g')
    
              if [ $first -eq 1 ]; then
                first=0
              else
                echo "," >> _data/calendar.json
              fi
    
              echo "  {" >> _data/calendar.json
              echo "    \"title\": \"$escaped_title\"," >> _data/calendar.json
              echo "    \"date\": \"$formatted_date\"" >> _data/calendar.json
              echo -n "  }" >> _data/calendar.json
            done < "${temp_events}.sorted"
  
            echo "" >> _data/calendar.json
            echo "]" >> _data/calendar.json
          else
            echo "[]" > _data/calendar.json
          fi

          rm -f "$temp_events" "${temp_events}.sorted"

          echo "Calendar events saved to _data/calendar.json"
          
          SCRIPT
          
          chmod +x parse_calendar.sh
          ./parse_calendar.sh
      
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -s _data/calendar.json ]; then
            if grep -q "title" _data/calendar.json; then
              git add _data/calendar.json
              if ! git diff --cached --quiet; then
                git commit -m "Update calendar events [skip ci]"
                git push
              fi
            fi
          fi
