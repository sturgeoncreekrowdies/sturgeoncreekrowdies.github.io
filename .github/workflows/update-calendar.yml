name: Update Calendar Events

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch-calendar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Fetch and parse Google Calendar
        run: |
          # Google Calendar URL
          CALENDAR_URL="https://calendar.google.com/calendar/ical/408c54c5483208e82d01dec30a088ede7c00ab95f7ec06abfa371b95cc051b0d%40group.calendar.google.com/public/basic.ics?singleevents=true"
          
          echo "=== Downloading calendar ==="
          curl -L "$CALENDAR_URL" -o calendar.ics
          
          echo "=== Creating parsing script ==="
          cat > parse_calendar.sh << 'SCRIPT'
          #!/bin/bash
          
          echo "Starting calendar parsing..."
          
          today=$(date +%Y%m%d)
          echo "Today's date (YYYYMMDD): $today"
          
          # Create _data directory
          mkdir -p _data
          
          # Initialize JSON
          echo "[" > _data/calendar.json
          
          # Initialize variables
          current_title=""
          current_date=""
          current_date_raw=""
          first_event=true
          event_count=0
          future_event_count=0
          
          echo "=== Processing calendar entries ==="
          
          # Read the entire file and process events
          while IFS= read -r line; do
            # Check for SUMMARY
            if [[ $line == SUMMARY:* ]]; then
              # If we already have a title and date, process the previous event first
              if [[ -n "$current_title" && -n "$current_date" && -n "$current_date_raw" ]]; then
                echo "  Processing stored event: $current_title"
                if [[ $current_date_raw -ge $today ]]; then
                  ((future_event_count++))
                  if [ "$first_event" = true ]; then
                    first_event=false
                  else
                    echo "," >> _data/calendar.json
                  fi
                  escaped_title=$(echo "$current_title" | sed 's/\\/\\\\/g' | sed 's/"/\\"/g')
                  echo "  {" >> _data/calendar.json
                  echo "    \"title\": \"$escaped_title\"," >> _data/calendar.json
                  echo "    \"date\": \"$current_date\"" >> _data/calendar.json
                  echo -n "  }" >> _data/calendar.json
                fi
                ((event_count++))
                # Reset for next event
                current_title=""
                current_date=""
                current_date_raw=""
              fi
              
              # Get the new title
              current_title="${line#SUMMARY:}"
              current_title="${current_title#"${current_title%%[![:space:]]*}"}"
              current_title="${current_title%"${current_title##*[![:space:]]}"}"
              echo "Found event: $current_title"
            fi
            
            # Check for DTSTART
            if [[ $line =~ DTSTART(:|;VALUE=DATE:)([0-9]{4})([0-9]{2})([0-9]{2}) ]]; then
              year="${BASH_REMATCH[2]}"
              month="${BASH_REMATCH[3]}"
              day="${BASH_REMATCH[4]}"
              current_date="$month/$day/$year"
              current_date_raw="${year}${month}${day}"
              echo "  Date for '$current_title': $current_date (raw: $current_date_raw)"
            fi
          done < calendar.ics
          
          # Process the last event after the loop
          if [[ -n "$current_title" && -n "$current_date" && -n "$current_date_raw" ]]; then
            echo "  Processing final event: $current_title"
            if [[ $current_date_raw -ge $today ]]; then
              ((future_event_count++))
              if [ "$first_event" = true ]; then
                first_event=false
              else
                echo "," >> _data/calendar.json
              fi
              escaped_title=$(echo "$current_title" | sed 's/\\/\\\\/g' | sed 's/"/\\"/g')
              echo "  {" >> _data/calendar.json
              echo "    \"title\": \"$escaped_title\"," >> _data/calendar.json
              echo "    \"date\": \"$current_date\"" >> _data/calendar.json
              echo -n "  }" >> _data/calendar.json
            fi
            ((event_count++))
          fi
          
          # Close the JSON array
          echo "" >> _data/calendar.json
          echo "]" >> _data/calendar.json
          
          echo "=== Parsing complete ==="
          echo "Total events found: $event_count"
          echo "Future events included: $future_event_count"
          
          echo "=== Generated JSON output ==="
          cat _data/calendar.json
          SCRIPT
          
          chmod +x parse_calendar.sh
          ./parse_calendar.sh
      
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -f _data/calendar.json ] && [ -s _data/calendar.json ]; then
            if grep -q "title" _data/calendar.json; then
              git add _data/calendar.json
              if ! git diff --cached --quiet; then
                git commit -m "Update calendar events [skip ci]"
                git push
                echo "✓ Successfully pushed updates"
              else
                echo "No changes to commit"
              fi
            else
              echo "No events found in calendar"
            fi
          else
            echo "calendar.json does not exist or is empty"
          fi
